<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0a0a14 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      padding: 20px;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 8px;
      text-shadow: 0 0 20px #41C0F2;
      margin-bottom: 10px;
    }

    .score-bar {
      display: flex;
      justify-content: space-between;
      width: 100%;
      max-width: 400px;
      gap: 10px;
    }

    .score-box {
      flex: 1;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
      border: 1px solid #333;
    }

    .score-box.high-score {
      border-color: #41C0F2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .score-label {
      font-size: 12px;
      color: #888;
      letter-spacing: 2px;
      font-weight: 600;
    }

    .score-value {
      font-size: 28px;
      font-weight: bold;
      color: #ffffff;
      margin-top: 4px;
    }

    .score-value.high {
      color: #41C0F2;
    }

    .trophy-icon {
      color: #41C0F2;
      font-size: 16px;
    }

    .difficulty-container {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .difficulty-btn {
      padding: 8px 16px;
      border-radius: 20px;
      background: #1a1a2e;
      border: 1px solid #333;
      color: #888;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .difficulty-btn:hover {
      border-color: #41C0F2;
    }

    .difficulty-btn.active {
      background: #41C0F2;
      border-color: #41C0F2;
      color: #000000;
    }

    .difficulty-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .game-board {
      background: #1a1a2e;
      border-radius: 8px;
      border: 2px solid #41C0F2;
      padding: 4px;
      box-shadow: 0 0 20px rgba(65, 192, 242, 0.3);
      display: grid;
      gap: 2px;
    }

    .cell {
      width: 16px;
      height: 16px;
      background: #16213e;
      border-radius: 3px;
    }

    .cell.snake-head {
      background: #41C0F2;
      border-radius: 4px;
      box-shadow: 0 0 8px #41C0F2;
    }

    .cell.snake-body {
      background: #ffffff;
      border-radius: 3px;
      opacity: 0.9;
    }

    .cell.food {
      background: #41C0F2;
      border-radius: 50%;
      box-shadow: 0 0 10px #41C0F2;
    }

    .control-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #41C0F2;
      color: #000000;
      padding: 12px 30px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      background: #5ad0ff;
      transform: scale(1.02);
    }

    .control-btn:active {
      transform: scale(0.98);
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 2px;
      margin-top: 20px;
    }

    .dpad-btn {
      width: 60px;
      height: 60px;
      background: #1a1a2e;
      border: 2px solid #41C0F2;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.1s ease;
      box-shadow: 0 0 6px rgba(65, 192, 242, 0.3);
    }

    .dpad-btn:hover {
      background: #41C0F2;
    }

    .dpad-btn:active {
      background: #41C0F2;
      box-shadow: 0 0 12px #41C0F2;
    }

    .dpad-btn svg {
      width: 32px;
      height: 32px;
      stroke: #41C0F2;
      stroke-width: 3;
    }

    .dpad-btn:hover svg,
    .dpad-btn:active svg {
      stroke: #000000;
    }

    .dpad-center {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dpad-center-dot {
      width: 20px;
      height: 20px;
      background: #41C0F2;
      border-radius: 50%;
      opacity: 0.5;
    }

    .keyboard-hint {
      margin-top: 15px;
      color: #555;
      font-size: 12px;
    }

    /* Game Over Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      width: 85%;
      max-width: 350px;
      border: 2px solid #41C0F2;
      box-shadow: 0 0 40px rgba(65, 192, 242, 0.5);
    }

    .modal-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .modal-title {
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 4px;
      margin-bottom: 10px;
    }

    .new-high-score {
      background: #41C0F2;
      color: #000000;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .modal-scores {
      width: 100%;
      margin-bottom: 25px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 5px;
      border-bottom: 1px solid #2a2a4e;
    }

    .score-row-label {
      font-size: 18px;
      color: #888;
      font-weight: 500;
    }

    .score-row-value {
      font-size: 24px;
      font-weight: bold;
    }

    .score-row-value.best {
      color: #41C0F2;
    }

    .try-again-btn {
      background: #41C0F2;
      color: #000000;
      padding: 15px 40px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 2px;
      border: none;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
    }

    .try-again-btn:hover {
      background: #5ad0ff;
    }

    @media (max-width: 500px) {
      .cell {
        width: 14px;
        height: 14px;
      }

      h1 {
        font-size: 1.8rem;
        letter-spacing: 4px;
      }

      .dpad {
        grid-template-columns: repeat(3, 50px);
        grid-template-rows: repeat(3, 50px);
      }

      .dpad-btn {
        width: 50px;
        height: 50px;
      }

      .dpad-center {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>SNAKE</h1>

    <div class="score-bar">
      <div class="score-box">
        <div class="score-label">SCORE</div>
        <div class="score-value" id="currentScore">0</div>
      </div>
      <div class="score-box high-score">
        <span class="trophy-icon">🏆</span>
        <div class="score-label">BEST</div>
        <div class="score-value high" id="highScore">0</div>
      </div>
    </div>

    <div class="difficulty-container">
      <button class="difficulty-btn" data-difficulty="easy">EASY</button>
      <button class="difficulty-btn active" data-difficulty="medium">MEDIUM</button>
      <button class="difficulty-btn" data-difficulty="hard">HARD</button>
    </div>

    <div class="game-board" id="gameBoard"></div>

    <div class="controls">
      <button class="control-btn" id="controlBtn">
        <span id="controlIcon">▶</span>
        <span id="controlText">START GAME</span>
      </button>
    </div>

    <div class="dpad">
      <div></div>
      <button class="dpad-btn" data-direction="UP">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
      </button>
      <div></div>

      <button class="dpad-btn" data-direction="LEFT">
        <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      </button>
      <div class="dpad-center"><div class="dpad-center-dot"></div></div>
      <button class="dpad-btn" data-direction="RIGHT">
        <svg viewBox="0 0 24 24" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <div></div>
      <button class="dpad-btn" data-direction="DOWN">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </button>
      <div></div>
    </div>

    <p class="keyboard-hint">Use arrow keys or WASD to move</p>
  </div>

  <!-- Game Over Modal -->
  <div class="modal-overlay" id="gameOverModal">
    <div class="modal">
      <div class="modal-icon">💀</div>
      <div class="modal-title">GAME OVER</div>
      <div class="new-high-score" id="newHighScoreBadge" style="display: none;">NEW HIGH SCORE!</div>
      <div class="modal-scores">
        <div class="score-row">
          <span class="score-row-label">Score</span>
          <span class="score-row-value" id="modalScore">0</span>
        </div>
        <div class="score-row">
          <span class="score-row-label">Best</span>
          <span class="score-row-value best" id="modalHighScore">0</span>
        </div>
      </div>
      <button class="try-again-btn" id="tryAgainBtn">TRY AGAIN</button>
    </div>
  </div>

  <script>
    // Game Constants
    const GRID_SIZE = 20;
    const DIFFICULTY_SPEEDS = {
      easy: 200,
      medium: 120,
      hard: 70
    };

    // Game State
    let snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
    let food = {x: 15, y: 15};
    let direction = 'RIGHT';
    let nextDirection = 'RIGHT';
    let gameState = 'idle'; // idle, playing, paused, gameOver
    let score = 0;
    let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
    let difficulty = 'medium';
    let gameLoop = null;

    // DOM Elements
    const gameBoard = document.getElementById('gameBoard');
    const currentScoreEl = document.getElementById('currentScore');
    const highScoreEl = document.getElementById('highScore');
    const controlBtn = document.getElementById('controlBtn');
    const controlIcon = document.getElementById('controlIcon');
    const controlText = document.getElementById('controlText');
    const gameOverModal = document.getElementById('gameOverModal');
    const newHighScoreBadge = document.getElementById('newHighScoreBadge');
    const modalScore = document.getElementById('modalScore');
    const modalHighScore = document.getElementById('modalHighScore');
    const tryAgainBtn = document.getElementById('tryAgainBtn');
    const difficultyBtns = document.querySelectorAll('.difficulty-btn');
    const dpadBtns = document.querySelectorAll('.dpad-btn');

    // Initialize
    function init() {
      createBoard();
      updateScoreDisplay();
      setupEventListeners();
    }

    function createBoard() {
      gameBoard.innerHTML = '';
      gameBoard.style.gridTemplateColumns = `repeat(${GRID_SIZE}, 16px)`;
      gameBoard.style.gridTemplateRows = `repeat(${GRID_SIZE}, 16px)`;

      for (let y = 0; y < GRID_SIZE; y++) {
        for (let x = 0; x < GRID_SIZE; x++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.x = x;
          cell.dataset.y = y;
          gameBoard.appendChild(cell);
        }
      }
      render();
    }

    function render() {
      // Clear all cells
      document.querySelectorAll('.cell').forEach(cell => {
        cell.className = 'cell';
      });

      // Render snake
      snake.forEach((segment, index) => {
        const cell = document.querySelector(`.cell[data-x="${segment.x}"][data-y="${segment.y}"]`);
        if (cell) {
          if (index === 0) {
            cell.classList.add('snake-head');
          } else {
            cell.classList.add('snake-body');
          }
        }
      });

      // Render food
      const foodCell = document.querySelector(`.cell[data-x="${food.x}"][data-y="${food.y}"]`);
      if (foodCell) {
        foodCell.classList.add('food');
      }
    }

    function generateFood() {
      let newFood;
      do {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
      } while (snake.some(seg => seg.x === newFood.x && seg.y === newFood.y));
      return newFood;
    }

    function moveSnake() {
      direction = nextDirection;
      const head = snake[0];
      let newHead;

      switch (direction) {
        case 'UP':
          newHead = {x: head.x, y: head.y - 1};
          break;
        case 'DOWN':
          newHead = {x: head.x, y: head.y + 1};
          break;
        case 'LEFT':
          newHead = {x: head.x - 1, y: head.y};
          break;
        case 'RIGHT':
          newHead = {x: head.x + 1, y: head.y};
          break;
      }

      // Check collision
      if (checkCollision(newHead)) {
        gameOver();
        return;
      }

      snake.unshift(newHead);

      // Check food
      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        updateScoreDisplay();
        food = generateFood();
      } else {
        snake.pop();
      }

      render();
    }

    function checkCollision(head) {
      // Wall collision
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        return true;
      }
      // Self collision
      return snake.some(seg => seg.x === head.x && seg.y === head.y);
    }

    function startGame() {
      snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
      food = generateFood();
      direction = 'RIGHT';
      nextDirection = 'RIGHT';
      score = 0;
      gameState = 'playing';
      updateScoreDisplay();
      updateControlButton();
      enableDifficultyButtons(false);
      render();

      gameLoop = setInterval(moveSnake, DIFFICULTY_SPEEDS[difficulty]);
    }

    function pauseGame() {
      if (gameState === 'playing') {
        gameState = 'paused';
        clearInterval(gameLoop);
      } else if (gameState === 'paused') {
        gameState = 'playing';
        gameLoop = setInterval(moveSnake, DIFFICULTY_SPEEDS[difficulty]);
      }
      updateControlButton();
    }

    function gameOver() {
      gameState = 'gameOver';
      clearInterval(gameLoop);

      // Check high score
      const isNewHighScore = score > highScore;
      if (isNewHighScore) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore.toString());
        updateScoreDisplay();
      }

      // Show modal
      modalScore.textContent = score;
      modalHighScore.textContent = highScore;
      newHighScoreBadge.style.display = isNewHighScore ? 'inline-block' : 'none';
      gameOverModal.classList.add('active');

      enableDifficultyButtons(true);
    }

    function updateScoreDisplay() {
      currentScoreEl.textContent = score;
      highScoreEl.textContent = highScore;
    }

    function updateControlButton() {
      switch (gameState) {
        case 'idle':
          controlIcon.textContent = '▶';
          controlText.textContent = 'START GAME';
          break;
        case 'playing':
          controlIcon.textContent = '⏸';
          controlText.textContent = 'PAUSE';
          break;
        case 'paused':
          controlIcon.textContent = '▶';
          controlText.textContent = 'RESUME';
          break;
      }
    }

    function enableDifficultyButtons(enabled) {
      difficultyBtns.forEach(btn => {
        btn.disabled = !enabled;
      });
    }

    function changeDirection(newDir) {
      const opposites = {
        UP: 'DOWN',
        DOWN: 'UP',
        LEFT: 'RIGHT',
        RIGHT: 'LEFT'
      };
      if (opposites[newDir] !== direction) {
        nextDirection = newDir;
      }
    }

    function setupEventListeners() {
      // Control button
      controlBtn.addEventListener('click', () => {
        if (gameState === 'idle') {
          startGame();
        } else if (gameState === 'playing' || gameState === 'paused') {
          pauseGame();
        }
      });

      // Try again button
      tryAgainBtn.addEventListener('click', () => {
        gameOverModal.classList.remove('active');
        startGame();
      });

      // Difficulty buttons
      difficultyBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (gameState === 'idle' || gameState === 'gameOver') {
            difficultyBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            difficulty = btn.dataset.difficulty;
          }
        });
      });

      // D-pad buttons
      dpadBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          if (gameState === 'playing') {
            changeDirection(btn.dataset.direction);
          }
        });
      });

      // Keyboard controls
      document.addEventListener('keydown', (e) => {
        const keyMap = {
          'ArrowUp': 'UP',
          'ArrowDown': 'DOWN',
          'ArrowLeft': 'LEFT',
          'ArrowRight': 'RIGHT',
          'w': 'UP',
          'W': 'UP',
          's': 'DOWN',
          'S': 'DOWN',
          'a': 'LEFT',
          'A': 'LEFT',
          'd': 'RIGHT',
          'D': 'RIGHT'
        };

        if (keyMap[e.key] && gameState === 'playing') {
          e.preventDefault();
          changeDirection(keyMap[e.key]);
        }

        if ((e.key === ' ' || e.key === 'Escape') && (gameState === 'playing' || gameState === 'paused')) {
          e.preventDefault();
          pauseGame();
        }
      });
    }

    // Start the game
    init();
  </script>
</body>
</html>
